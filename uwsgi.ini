[uwsgi]
chdir           = /app/

# Master + clean shutdown
master          = true
no-default-app  = true
pidfile         = /run/%n.pid
die-on-term     = true
vacuum          = true
no-orphans      = true

# WP4 onboarding serves a UI + public /lists/* endpoints at the root.
# (ms-registry mounts at /api ; we don't.)
module          = lote_registry.wsgi:application

# Process names for `ps`
auto-procname           = true
procname-prefix-space   = [%n]

# Workers
processes       = 4
enable-threads
thunder-lock

# Bind: uWSGI socket for nginx, plain HTTP for direct access / healthcheck
socket          = 0.0.0.0:3030
http            = 0.0.0.0:8000
status          = /run/%n-stats.sock

# Larger header buffer for OAuth / cookies
buffer-size     = 32768

# Static + media handled by WhiteNoise inside the Django process.
# (uncomment if you ever want uWSGI to serve them directly)
# static-map = /static=/var/www/static
# static-map = /media=/var/www/media
